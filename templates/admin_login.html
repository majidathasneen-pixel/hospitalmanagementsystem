{% extends 'base.html' %}

{% block content %}

<div class="login-container">

    <div class="login-box">

        <h1>🏥 Admin Login</h1>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</div>

{% endblock %}
